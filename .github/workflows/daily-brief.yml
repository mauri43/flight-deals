name: Daily flight brief

on:
  schedule:
    # 5:30pm EST = 22:30 UTC (EST is UTC-5)
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --pre -r requirements.txt

      - name: Send daily brief
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python daily_brief.py

      - name: Reset deals log
        run: |
          git config user.name "flight-deals-bot"
          git config user.email "bot@flight-deals"
          git add deals_today.json
          git diff --staged --quiet || git commit -m "chore: reset daily deals log [skip ci]"
          git push || true
